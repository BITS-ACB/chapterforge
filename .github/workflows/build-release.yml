name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the installers to (only used for manual runs)"
        required: true
        default: "v1.0.0"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller py7zr

      - name: Fetch libmpv
        # ChapterForge.spec bundles bin/mpv/libmpv-2.dll into the build; it's
        # gitignored (too large for source control), so it must be downloaded
        # before PyInstaller runs. py7zr (installed above) extracts the .7z.
        run: python tools/get_libmpv.py

      - name: Patch feedback token into app
        # Injects the fine-grained PAT (issues:write only) at build time.
        # The token never lives in source — only in this secret and the binary.
        shell: bash
        env:
          CHAPTERFORGE_GITHUB_TOKEN: ${{ secrets.CHAPTERFORGE_GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import re, os, pathlib
          path = pathlib.Path("chapterforge/app.py")
          src = path.read_text(encoding="utf-8")
          token = os.environ["CHAPTERFORGE_GITHUB_TOKEN"]
          patched = re.sub(
              r'_FEEDBACK_GITHUB_TOKEN = os\.environ\.get\("CHAPTERFORGE_GITHUB_TOKEN", ""\)',
              f'_FEEDBACK_GITHUB_TOKEN = "{token}"',
              src,
          )
          path.write_text(patched, encoding="utf-8")
          assert 'os.environ.get("CHAPTERFORGE_GITHUB_TOKEN"' not in patched, "Token injection failed"
          print("Token injected into build.")
          EOF

      - name: Build with PyInstaller
        run: pyinstaller ChapterForge.spec -y

      - name: Build installers
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\ChapterForge.iss
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\ChapterForge-Portable.iss

      - name: Upload installers to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            installer_output/ChapterForge-Setup.exe
            installer_output/ChapterForge-Portable.exe
